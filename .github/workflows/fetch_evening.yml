name: Fetch Evening Session

# Runs at 17:30 UTC = 18:30 WAT, ahead of the 19:00 WAT evening session
# window.
on:
  schedule:
    - cron: "30 17 * * *"  # 17:30 UTC = 18:30 WAT
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evening fetch
        run: python -m src.fetch --session evening
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_HOST: ${{ secrets.API_FOOTBALL_HOST }}

      - name: Commit and push updated data
        run: |
          git config user.name "football-bot-actions"
          git config user.email "actions@users.noreply.github.com"
          git add data/evening.json data/team_stats_cache.json data/standings_cache.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update evening session data [skip ci]"
            git push
          fi
